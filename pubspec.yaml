name: news_apps
description: "A Flutter news app with Firebase Auth, NewsAPI, GetX, and SQLite."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  get: ^4.6.6

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1

  # Networking
  http: ^1.2.2

  # Local Storage
  sqflite: ^2.3.3+1
  path: ^1.9.0
  shared_preferences: ^2.3.2

  # UI
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  flutter_spinkit: ^5.2.1
  shimmer: ^3.0.0

  # Connectivity
  connectivity_plus: ^6.0.5

  # Image handling
  path_provider: ^2.1.4

  # URL Launcher
  url_launcher: ^6.3.1

  # Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.13
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
